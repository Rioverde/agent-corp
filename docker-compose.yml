services:
  auth-service:
    build:
      context: .
      dockerfile: cmd/auth-service/dockerfile
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      VAULT_REQUIRED: "true"
      VAULT_SECRET_PATH: "auth"
      VAULT_MOUNT_PATH: "secret"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent_corp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_corp"]
      interval: 5s
      timeout: 5s
      retries: 10

  vault:
    image: hashicorp/vault:1.16
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  vault-init:
    image: hashicorp/vault:1.16
    restart: "no"
    entrypoint:
      - /bin/sh
      - -ec
      - |
        vault kv put secret/auth \
          DATABASE_URL="$${DATABASE_URL}" \
          DATABASE_MAX_CONNS="$${DATABASE_MAX_CONNS}" \
          DATABASE_MIN_CONNS="$${DATABASE_MIN_CONNS}" \
          DATABASE_MAX_CONN_IDLE_TIME="$${DATABASE_MAX_CONN_IDLE_TIME}"
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      DATABASE_URL: postgres://agent:agent@postgres:5432/agent_corp?sslmode=disable
      DATABASE_MAX_CONNS: "10"
      DATABASE_MIN_CONNS: "2"
      DATABASE_MAX_CONN_IDLE_TIME: 5m
    depends_on:
      vault:
        condition: service_healthy

volumes:
  postgres_data:
