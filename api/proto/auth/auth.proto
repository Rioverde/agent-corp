syntax = "proto3";

package auth;

// Path for generating Go code
option go_package = "github.com/Rioverde/agent-corp/api/proto/auth;auth";

//  Import standard annotations for gRPC <-> HTTP mapping
import "google/api/annotations.proto";

// AuthService — service for authentication for our agents
service AuthService {
  
  // Registration: Envoy will convert this to a POST request
  rpc Register (RegisterRequest) returns (RegisterResponse) {
    option (google.api.http) = {
      post: "/v1/auth/register"
      body: "*"
    };
  }

  // Login: get access tokens
  rpc Login (LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/v1/auth/login"
      body: "*"
    };
  }
}

// Messages for registration
message RegisterRequest {
  string email = 1;
  string password = 2;
}

message RegisterResponse {
  string user_id = 1;
}

// Messages for authentication
message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;
  string token_type = 4;
}