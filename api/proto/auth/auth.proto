syntax = "proto3";

package auth;

// Путь для генерации Go-кода
option go_package = "github.com/Rioverde/agent-corp/api/proto/auth;auth";

// Импорт стандартных аннотаций Google для маппинга gRPC <-> HTTP
import "google/api/annotations.proto";

// AuthService — сервис аутентификации для нашего роя агентов
service AuthService {
  
  // Регистрация: Envoy превратит это в POST запрос
  rpc Register (RegisterRequest) returns (RegisterResponse) {
    option (google.api.http) = {
      post: "/v1/auth/register"
      body: "*"
    };
  }

  // Логин: получение токенов доступа
  rpc Login (LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/v1/auth/login"
      body: "*"
    };
  }
}

// Сообщения для регистрации
message RegisterRequest {
  string email = 1;
  string password = 2;
}

message RegisterResponse {
  string user_id = 1;
}

// Сообщения для авторизации
message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
}